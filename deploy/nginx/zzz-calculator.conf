server {
    listen 80;
    listen [::]:80;
    server_name zzzcaculator.top www.zzzcaculator.top;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type "text/plain";
        try_files $uri =404;
    }

    return 301 https://zzzcaculator.top$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name 121.199.21.10;

    root /opt/zzz_calculator/current/dist/pages;
    client_max_body_size 50m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    location = /downloads/zzz-scanner/manifest.json {
        root /srv/zzz-download-origin;
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /downloads/zzz-scanner/helper-manifest.json {
        root /srv/zzz-download-origin;
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location ^~ /downloads/ {
        root /srv/zzz-download-origin;
        try_files $uri =404;
        sendfile on;
        tcp_nopush on;
        add_header Accept-Ranges "bytes" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Content-Disposition "attachment" always;
    }

    location ^~ /static/app/ {
        try_files $uri @app_http;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /assets/ {
        try_files $uri @app_http;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location = /maintenance.html { return 404; }
    location = /maintenance.js { return 404; }
    location ^~ /api/maintenance/ { return 403; }

    location ^~ /api/internal/scan-telemetry/ {
        auth_basic "ZZZ Scanner Diagnostics";
        auth_basic_user_file /etc/nginx/zzz-calculator-scan-admin.htpasswd;
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Scan-Telemetry-Admin 1;
    }

    location ^~ /internal/scans {
        auth_basic "ZZZ Scanner Diagnostics";
        auth_basic_user_file /etc/nginx/zzz-calculator-scan-admin.htpasswd;
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Real-IP $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location @app_http {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Real-IP $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name zzzcaculator.top www.zzzcaculator.top;

    root /opt/zzz_calculator/current/dist/pages;
    client_max_body_size 50m;

    ssl_certificate /etc/nginx/certs/zzzcaculator.top/zzzcaculator.top.pem;
    ssl_certificate_key /etc/nginx/certs/zzzcaculator.top/zzzcaculator.top.key;
    ssl_protocols TLSv1.2 TLSv1.3;
