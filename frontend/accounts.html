<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>账号 | ZZZ 驱动盘计算器</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <img class="brand-mark" src="/zzz-mark.svg" alt="ZZZ">
        <div>
          <div class="brand-name">绝区零计算器</div>
          <div class="brand-sub">驱动盘 · 音擎 · 局外/局内面板</div>
        </div>
      </div>

      <nav class="side-nav">
        <a href="/" class="nav-item">优化器</a>
        <a href="/drive-discs.html" class="nav-item">驱动盘</a>
        <a href="/accounts.html" class="nav-item active" data-account-label>账号 / 加载中</a>
        <a href="/maintenance.html" class="nav-item" hidden>维护</a>
      </nav>

      <div class="sidebar-foot">
        <div class="mini-chip" id="status">加载中</div>
        <div class="mini-note">账号 · 仓库隔离</div>
      </div>
    </aside>

    <main class="content inventory-content">
      <header class="page-header">
        <div class="title-block">
          <div class="eyebrow">ACCOUNTS</div>
          <h1>账号</h1>
          <p>创建、切换和维护不同账号的驱动盘仓库</p>
        </div>
        <div class="header-actions">
          <button id="addAccountBtn" type="button" class="primary-btn">+ 新增账号</button>
        </div>
      </header>

      <div id="pageNotice" class="page-notice-host" data-page-notice aria-live="polite" hidden></div>

      <section class="inventory-shell">
        <div class="inventory-topline">
          <div>
            <h2>账号列表</h2>
            <p>每个账号拥有独立的驱动盘、套装预设与计算状态</p>
          </div>
        </div>
        <div class="disc-table-wrap clean-table-wrap">
          <table class="disc-table clean-disc-table">
            <thead>
              <tr>
                <th>账号</th>
                <th>状态</th>
                <th>驱动盘</th>
                <th>套装预设</th>
                <th>导入记录</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="accountTableBody"></tbody>
          </table>
        </div>
        <div id="emptyAccounts" class="inventory-empty" hidden>
          <img src="/assets/drive-discs/empty.svg" alt="">
          <strong>暂无账号</strong>
          <span>暂无账号</span>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/accounts-page.js"></script>
</body>
</html>
